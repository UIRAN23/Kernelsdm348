name: Build Clean Kernel — Mi439/Olive (boot.img)

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: 'URL boot.img или ROM zip (оставь пустым для автоскачивания)'
        required: false
        default: ''
      use_ccache:
        description: 'Использовать ccache?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_release:
        description: 'Создать GitHub Release?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            azure-cli google-chrome-stable firefox powershell \
            mono-devel --fix-missing 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/powershell /usr/share/swift
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            python3 zip unzip curl wget \
            lz4 zstd cpio kmod ccache

      - name: Restore ccache
        if: ${{ github.event.inputs.use_ccache == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-mi439-clean-${{ github.run_id }}
          restore-keys: ccache-mi439-clean-

      - name: Setup ccache
        if: ${{ github.event.inputs.use_ccache == 'true' }}
        run: |
          ccache -M 5G && ccache -z
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ── Клонируем ядро БЕЗ KSU — ветка mithorium/a13/master ────
      # a16-ksu-ram1 содержит KSU Next встроенный в исходники — НЕ используем
      # master — чистое ядро без root решений
      - name: Clone kernel source (clean, no KSU)
        run: |
          git clone --depth=1 \
            -b mithorium/a13/master \
            https://github.com/tavukkdoner/kernel_msm-4.19 \
            kernel
          echo "=== Kernel cloned: mithorium/a13/master (no KSU) ==="

      - name: Clone DTS repos
        run: |
          git clone --depth=1 -b dts/avc1 \
            https://github.com/tavukkdoner/kernel_devicetree_msm-4.19 \
            kernel/arch/arm64/boot/dts/vendor-legacy
          git clone --depth=1 -b dts/mi8937/4.19/master \
            https://github.com/Mi-Thorium/kernel_devicetree_xiaomi-msm8937 \
            kernel/arch/arm64/boot/dts/xiaomi-msm8937
          git clone --depth=1 -b dts/mi439/4.19/master \
            https://github.com/Mi-Thorium/kernel_devicetree_xiaomi-sdm439 \
            kernel/arch/arm64/boot/dts/xiaomi-sdm439
          echo "DTS: OK"

      - name: Clone techpack modules
        run: |
          git clone --depth=1 -b techpack/mi8937/4.19/master \
            https://github.com/Mi-Thorium/kernel_techpack_xiaomi-msm8937 \
            kernel/techpack/xiaomi-msm8937
          git clone --depth=1 -b techpack/mi439/4.19/master \
            https://github.com/Mi-Thorium/kernel_techpack_xiaomi-sdm439 \
            kernel/techpack/xiaomi-sdm439
          git clone --depth=1 -b audio/4.19/mithorium/master-16 \
            https://github.com/tavukkdoner/kernel_techpack_audio-legacy \
            kernel/techpack/audio-legacy
          git clone --depth=1 \
            -b camera/LA.UM.8.6.r1-05300-89xx.0/4.19/mithorium \
            https://github.com/Mi-Thorium/kernel_techpack_camera-legacy \
            kernel/techpack/camera-legacy
          git clone --depth=1 \
            -b camera/LA.UM.5.3-10610-89xx.0/4.19/mithorium \
            https://github.com/Mi-Thorium/kernel_techpack_camera-legacy \
            kernel/techpack/camera-legacy-m
          echo "techpack: OK"

      - name: Clone prima WLAN driver
        run: |
          git clone --depth=1 \
            -b wlan/LA.UM.9.6.4/mithorium/master1-lto \
            https://github.com/tavukkdoner/vendor_qcom_opensource_wlan_prima \
            kernel/drivers/staging/prima
          echo "prima: OK"

      - name: Download Neutron Clang
        run: |
          mkdir -p toolchain
          CLANG_URL=$(curl -s \
            "https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              url = a.get('browser_download_url', '')
              if url.endswith('.tar.zst'):
                  print(url); break
          ")
          [ -z "$CLANG_URL" ] && \
            CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/11012025/neutron-clang-11012025.tar.zst"
          echo "Clang: $CLANG_URL"
          wget -q --show-progress "$CLANG_URL" -O neutron-clang.tar.zst
          tar --use-compress-program=zstd -xf neutron-clang.tar.zst -C toolchain
          rm neutron-clang.tar.zst
          echo "CLANG_BIN=$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/toolchain/bin/clang" --version

      - name: Configure kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel
          [ "${{ github.event.inputs.use_ccache }}" = "true" ] && \
            KERN_CC="ccache clang" || KERN_CC="clang"

          MAKE_FLAGS="O=out ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1"

          # Ищем дефконфиг
          BASE=""
          for C in vendor/sdm439-perf_defconfig vendor/msm8937-perf_defconfig; do
            [ -f "arch/arm64/configs/$C" ] && BASE="$C" && break
          done
          [ -z "$BASE" ] && echo "ERROR: defconfig не найден!" && \
            find arch/arm64/configs -maxdepth 3 | sort && exit 1
          echo "defconfig: $BASE"

          make $MAKE_FLAGS CC="$KERN_CC" $BASE

          # Мерджим Mi-Thorium фрагменты
          FRAGMENTS=""
          for F in \
            arch/arm64/configs/vendor/common.config \
            arch/arm64/configs/vendor/feature/android-12.config \
            arch/arm64/configs/vendor/feature/exfat.config \
            arch/arm64/configs/vendor/feature/kprobes.config \
            arch/arm64/configs/vendor/feature/lmkd.config; do
            [ -f "$F" ] && FRAGMENTS="$FRAGMENTS $F"
          done
          if [ -n "$FRAGMENTS" ]; then
            KCONFIG_CONFIG=out/.config \
              ./scripts/kconfig/merge_config.sh -m out/.config $FRAGMENTS
            [ -f .config ] && mv .config out/.config
          fi

          # Отключаем KSU явно (чистое ядро)
          scripts/config --file out/.config -d KSU 2>/dev/null || true

          make $MAKE_FLAGS CC="$KERN_CC" olddefconfig
          echo "=== CONFIG KSU ==="
          grep "CONFIG_KSU" out/.config || echo "KSU: не включён (OK)"
          echo "Configuration done."

      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel
          [ "${{ github.event.inputs.use_ccache }}" = "true" ] && \
            KERN_CC="ccache clang" || KERN_CC="clang"

          BUILD_START=$(date +"%s")
          set +e
          make -j$(nproc --all) \
            O=out ARCH=arm64 \
            CC="$KERN_CC" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            Image.gz-dtb 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          DIFF=$(( $(date +"%s") - BUILD_START ))
          echo "Время: $((DIFF/60))m $((DIFF%60))s"
          [ "${{ github.event.inputs.use_ccache }}" = "true" ] && ccache -s || true
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "════ ОШИБКИ ════"
            grep -n " error:" build.log | grep -v "^Binary" | head -50 || true
            echo "════ ПОСЛЕДНИЕ 60 СТРОК ════"
            tail -60 build.log
            exit 1
          fi
          ls -lh out/arch/arm64/boot/Image.gz-dtb
          echo "Kernel: OK"

      # ── Собираем boot.img через magiskboot ──────────────────────
      # Скачиваем оригинальный boot.img из ROM tavukkdoner,
      # заменяем в нём ядро на свежесобранное
      - name: Build boot.img with magiskboot
        run: |
          mkdir -p boot_work

          # ── Шаг 1: скачиваем magiskboot ─────────────────────────
          echo "Скачиваем magiskboot..."
          MAGISK_URL=$(curl -s \
            "https://api.github.com/repos/topjohnwu/Magisk/releases/latest" \
            | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          for a in d.get('assets',[]):
              u=a.get('browser_download_url','')
              if u.endswith('.apk') and 'Magisk-v' in u:
                  print(u); break")
          wget -q "$MAGISK_URL" -O magisk.zip
          unzip -j magisk.zip "lib/x86_64/libmagiskboot.so" -d boot_work/ 2>/dev/null || \
          unzip -j magisk.zip "lib/x86/libmagiskboot.so" -d boot_work/ 2>/dev/null || true
          # Ищем в других путях
          if [ ! -f boot_work/libmagiskboot.so ]; then
            unzip -l magisk.zip | grep magiskboot || true
            unzip magisk.zip -d magisk_extracted/
            find magisk_extracted -name "*magiskboot*" | head -5
            find magisk_extracted -name "libmagiskboot.so" | head -1 | \
              xargs -I{} cp {} boot_work/libmagiskboot.so
          fi
          mv boot_work/libmagiskboot.so boot_work/magiskboot
          chmod +x boot_work/magiskboot
          echo "magiskboot: OK"

          # ── Шаг 2: скачиваем оригинальный boot.img ──────────────
          CUSTOM_URL="${{ github.event.inputs.boot_img_url }}"
          if [ -n "$CUSTOM_URL" ]; then
            echo "Скачиваем boot.img с: $CUSTOM_URL"
            wget -q --show-progress "$CUSTOM_URL" -O boot_work/rom.zip
          else
            # Скачиваем последний ROM tavukkdoner
            echo "Скачиваем ROM tavukkdoner (последний релиз)..."
            ROM_URL=$(curl -s \
              "https://api.github.com/repos/tavukkdoner/rom/releases/latest" \
              | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          assets=d.get('assets',[])
          # Ищем zip с Mi439
          for a in assets:
              u=a.get('browser_download_url','')
              if 'Mi439' in u and u.endswith('.zip'):
                  print(u); break
          if not assets:
              print('')" 2>/dev/null || echo "")

            if [ -n "$ROM_URL" ]; then
              echo "ROM URL: $ROM_URL"
              wget -q --show-progress "$ROM_URL" -O boot_work/rom.zip
            else
              # Фолбэк — хардкод последней известной версии
              echo "API не нашёл, используем известный URL..."
              wget -q --show-progress \
                "https://github.com/tavukkdoner/rom/releases/download/v154.1/EvolutionX-16.0-20260315-Mi439_4_19-11.6.2-Unofficial.zip" \
                -O boot_work/rom.zip
            fi
          fi

          # Извлекаем boot.img из ROM zip
          echo "Извлекаем boot.img..."
          unzip -j boot_work/rom.zip "boot.img" -d boot_work/ || \
          unzip -j boot_work/rom.zip "*/boot.img" -d boot_work/ || true

          if [ ! -f boot_work/boot.img ]; then
            echo "boot.img не найден в zip, список файлов:"
            unzip -l boot_work/rom.zip | head -30
            exit 1
          fi
          echo "boot.img: $(ls -lh boot_work/boot.img)"
          rm -f boot_work/rom.zip

          # ── Шаг 3: распаковываем boot.img ───────────────────────
          cd boot_work
          ./magiskboot unpack boot.img
          echo "=== Содержимое boot.img: ==="
          ls -lh
          echo "kernel: $(ls -lh kernel 2>/dev/null || echo 'не найден')"

          # ── Шаг 4: заменяем ядро ────────────────────────────────
          cp "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz-dtb" kernel
          echo "Ядро заменено."

          # ── Шаг 5: собираем новый boot.img ──────────────────────
          ./magiskboot repack boot.img
          ls -lh new-boot.img
          cp new-boot.img "$GITHUB_WORKSPACE/clean_boot.img"
          cd "$GITHUB_WORKSPACE"
          echo "boot.img готов: $(ls -lh clean_boot.img)"

      - name: Package outputs
        run: |
          DATE=$(date +%Y%m%d)

          # boot.img — для прямой прошивки через fastboot или FolkPatch/APatch
          cp clean_boot.img "clean_boot_Mi439_${DATE}.img"

          # Также делаем AnyKernel3 zip — для прошивки через TWRP
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp anykernel3/anykernel.sh AK3/anykernel.sh
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AK3/
          ZIP="AnyKernel3_CleanKernel_Mi439_${DATE}.zip"
          cd AK3 && zip -r9 "$GITHUB_WORKSPACE/$ZIP" . -x '*.git*' && cd ..

          echo "BOOT_IMG=clean_boot_Mi439_${DATE}.img" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          ls -lh clean_boot_Mi439_${DATE}.img "$ZIP"

      - name: Upload boot.img artifact
        uses: actions/upload-artifact@v4
        with:
          name: clean_boot_Mi439_${{ env.DATE }}
          path: ${{ env.BOOT_IMG }}
          retention-days: 30

      - name: Upload AnyKernel3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_CleanKernel_Mi439_${{ env.DATE }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Mi439 Clean Kernel — boot.img + AnyKernel3 #${{ github.run_number }}"
          body: |
            ## Чистое ядро для Redmi 8 / 8A / 8A Dual (olive / mi439)

            **Без KSU/Magisk/APatch** — готово для FolkPatch или APatch

            | | |
            |---|---|
            | Ядро | `tavukkdoner/kernel_msm-4.19` `mithorium/a13/master` |
            | KSU | ❌ не встроен |
            | Root | устанавливается отдельно (FolkPatch / APatch) |

            ### Способы установки

            **Через fastboot (рекомендуется для FolkPatch):**
            ```
            fastboot flash boot clean_boot_Mi439_*.img
            ```

            **Через TWRP:**
            Прошей AnyKernel3 zip

            ### После установки — FolkPatch:
            1. Установи FolkPatch APK
            2. Запусти → он запатчит boot.img с APatch
            3. Прошей патченный boot.img через fastboot
          files: |
            ${{ env.BOOT_IMG }}
            ${{ env.ZIP_NAME }}
