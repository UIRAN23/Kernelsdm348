name: Build Kernel — Mi439/Olive (KSU Next + SUSFS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ksu_next_branch:
        description: 'KernelSU Next branch'
        required: false
        default: 'next'
      upload_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'

jobs:
  build:
    # ubuntu-24.04: GLIBC 2.39 — требование Neutron Clang 18+ выполнено
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Зависимости
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            python3 zip unzip curl wget \
            lz4 zstd cpio kmod

      # ─────────────────────────────────────────────
      # 3. Клонируем ядро
      #
      #    ПОЧЕМУ tavukkdoner, а не Mi-Thorium:
      #    Mi-Thorium разбивает ядро на много репозиториев
      #    (prima, techpack/audio, techpack/camera-legacy и т.д.)
      #    и без них defconfig падает с "can't open file".
      #    tavukkdoner/android_kernel_xiaomi_sdm439-4.19 (ветка uvite)
      #    — монолитный форк, где всё уже внутри одного репо.
      # ─────────────────────────────────────────────
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b uvite \
            https://github.com/tavukkdoner/android_kernel_xiaomi_sdm439-4.19 \
            kernel
          echo "Kernel cloned. Branch: uvite"
          echo "techpack contents:"
          ls kernel/techpack/ || echo "(no techpack dir)"
          echo "drivers/staging contents:"
          ls kernel/drivers/staging/ | grep -i prima || echo "(prima not found in staging)"

      # ─────────────────────────────────────────────
      # 4. Toolchain — Neutron Clang
      # ─────────────────────────────────────────────
      - name: Download Neutron Clang
        run: |
          mkdir -p toolchain

          CLANG_URL=$(curl -s \
            "https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              url = a.get('browser_download_url','')
              if url.endswith('.tar.zst'):
                  print(url)
                  break
          ")

          if [ -z "$CLANG_URL" ]; then
            CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/11012025/neutron-clang-11012025.tar.zst"
            echo "API fallback: $CLANG_URL"
          else
            echo "Latest: $CLANG_URL"
          fi

          wget -q --show-progress "$CLANG_URL" -O neutron-clang.tar.zst
          tar --use-compress-program=zstd -xf neutron-clang.tar.zst -C toolchain
          rm neutron-clang.tar.zst

          echo "CLANG_BIN=$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/toolchain/bin/clang" --version

      # ─────────────────────────────────────────────
      # 5. Применяем KernelSU Next
      # ─────────────────────────────────────────────
      - name: Apply KernelSU Next
        run: |
          KSU_BRANCH="${{ github.event.inputs.ksu_next_branch || 'next' }}"
          cd kernel
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/${KSU_BRANCH}/kernel/setup.sh" \
            | bash -s "${KSU_BRANCH}"

          if [ -d "KernelSU" ]; then
            KSU_VER=$(grep ^KERNELSU_VERSION KernelSU/kernel/Makefile | cut -d= -f2 | tr -d ' ')
            echo "KSU Next: $KSU_VER"
            echo "KSU_VERSION=$KSU_VER" >> $GITHUB_ENV
          fi

      # ─────────────────────────────────────────────
      # 6. Применяем SUSFS патчи
      # ─────────────────────────────────────────────
      - name: Apply SUSFS patches
        run: |
          git clone --depth=1 \
            https://github.com/KernelSU-Next/kernel_patches \
            ksu_patches

          echo "=== Доступные патчи ==="
          find ksu_patches -name "*.patch" | sort

          cd kernel

          # Патч для ядра 4.19 (non-GKI)
          APPLIED=0
          for CANDIDATE in \
            "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel-4.19.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel-4.19.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel.patch"; do
            if [ -f "$CANDIDATE" ]; then
              echo "Applying: $CANDIDATE"
              patch -p1 --no-backup-if-mismatch < "$CANDIDATE" && APPLIED=1 && break || true
            fi
          done
          [ $APPLIED -eq 0 ] && echo "WARNING: SUSFS kernel patch not found"

          # fs/ mount патч
          for CANDIDATE in \
            "$GITHUB_WORKSPACE/ksu_patches/next/fs_susfs.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/next/fs/susfs.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/fs_susfs.patch"; do
            if [ -f "$CANDIDATE" ]; then
              echo "fs patch: $CANDIDATE"
              patch -p1 --no-backup-if-mismatch < "$CANDIDATE" || true
              break
            fi
          done

          echo "SUSFS done."

      # ─────────────────────────────────────────────
      # 7. Конфигурируем ядро
      # ─────────────────────────────────────────────
      - name: Configure kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          MAKE_FLAGS="O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1"

          # Ищем правильный defconfig для olive/sdm439
          DEFCONFIG=""
          for CANDIDATE in \
            vendor/sdm439-perf_defconfig \
            vendor/olive_defconfig \
            olive_defconfig \
            sdm439-perf_defconfig; do
            if [ -f "arch/arm64/configs/$CANDIDATE" ]; then
              DEFCONFIG="$CANDIDATE"
              echo "Found defconfig: $DEFCONFIG"
              break
            fi
          done

          if [ -z "$DEFCONFIG" ]; then
            echo "=== Доступные defconfig-ы ==="
            find arch/arm64/configs -name "*sdm439*" -o -name "*olive*" -o -name "*439*" | sort
            # Если ничего не нашли — берём первый vendor
            DEFCONFIG=$(ls arch/arm64/configs/vendor/ | grep -i "sdm\|perf\|qcom" | head -1)
            DEFCONFIG="vendor/$DEFCONFIG"
            echo "Fallback defconfig: $DEFCONFIG"
          fi

          make $MAKE_FLAGS $DEFCONFIG

          # KSU + SUSFS опции
          scripts/config --file out/.config \
            -e KSU \
            -e KSU_SUSFS \
            -e KSU_SUSFS_SUS_PATH \
            -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT \
            -e KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT \
            -e KSU_SUSFS_SPOOFE_UNAME \
            -e KSU_SUSFS_ENABLE_LOG \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS

          make $MAKE_FLAGS olddefconfig
          echo "Configuration done."

      # ─────────────────────────────────────────────
      # 8. Сборка ядра
      # ─────────────────────────────────────────────
      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel
          
          sed -i 's/EXPORT_TRACEPOINT_SYMBOL_GPL(clock_set_rate);/\/\/EXPORT_TRACEPOINT_SYMBOL_GPL(clock_set_rate);/g' kernel/trace/power-traces.c

          BUILD_START=$(date +"%s")

          make -j$(nproc --all) \
            O=out ARCH=arm64 \
            KCFLAGS="-Wno-error -Wno-pointer-arith -Wno-implicit-function-declaration" \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            Image.gz-dtb 2>&1 | tee build.log

          BUILD_END=$(date +"%s")
          DIFF=$((BUILD_END - BUILD_START))
          echo "Build time: $((DIFF / 60))m $((DIFF % 60))s"

          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "=== ПОСЛЕДНИЕ 100 СТРОК ==="
            tail -100 build.log
            exit 1
          fi
          echo "Image.gz-dtb: OK"

      # ─────────────────────────────────────────────
      # 9. Пакуем AnyKernel3
      # ─────────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp anykernel3/anykernel.sh AK3/anykernel.sh
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AK3/

          DATE=$(date +%Y%m%d)
          ZIP_NAME="Kernel-Mi439-Olive-KSU_Next_${{ env.KSU_VERSION }}-SUSFS-${DATE}.zip"

          cd AK3
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . -x '*.git*'
          cd ..

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME"

      # ─────────────────────────────────────────────
      # 10. Upload артефакт
      # ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-mi439-olive-ksu-susfs
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ─────────────────────────────────────────────
      # 11. GitHub Release
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Kernel Mi439/Olive — KSU Next + SUSFS (build #${{ github.run_number }})"
          body: |
            ## Ядро для Redmi 8 (olive / mi439)
            - **Источник**: tavukkdoner/android_kernel_xiaomi_sdm439-4.19 `uvite`
            - **KernelSU Next**: `${{ github.event.inputs.ksu_next_branch || 'next' }}`
            - **SUSFS**: включён
            - **ROM**: EvolutionX 16.0 (совместима)

            ### Установка
            1. Прошей ZIP через TWRP
            2. Установи APK KernelSU Next
          files: ${{ env.ZIP_NAME }}
