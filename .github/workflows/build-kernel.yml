name: Build Kernel — Mi439/Olive (KSU Next / SukiSU Ultra / ReSukiSU + SUSFS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KSU вариант'
        required: true
        default: 'ksu-next'
        type: choice
        options:
          - ksu-next        # KernelSU Next — стабильный
          - sukisu-ultra    # SukiSU Ultra — фокус на скрытии
          - resukisu        # ReSukiSU — поддержка старых ядер (4.x)
      enable_susfs:
        description: 'Включить SUSFS?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_release:
        description: 'Создать GitHub Release?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-24.04   # GLIBC 2.39 — нужен для Neutron Clang 18+
    permissions:
      contents: write

    steps:
      # ───────────────────────────────────────────────────────────
      # 1. Checkout
      # ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────
      # 2. Зависимости
      # ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            python3 zip unzip curl wget \
            lz4 zstd cpio kmod

      # ───────────────────────────────────────────────────────────
      # 3. Клонируем ядро
      #    tavukkdoner/android_kernel_xiaomi_sdm439-4.19 ветка uvite
      #    — монолитный форк Jprimero15, все драйверы в одном репо.
      # ───────────────────────────────────────────────────────────
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b uvite \
            https://github.com/tavukkdoner/android_kernel_xiaomi_sdm439-4.19 \
            kernel
          echo "=== Kernel cloned (uvite) ==="
          echo "Конфиги:"
          find kernel/arch/arm64/configs -maxdepth 3 | sort

      # ───────────────────────────────────────────────────────────
      # 4. Toolchain — Neutron Clang
      # ───────────────────────────────────────────────────────────
      - name: Download Neutron Clang
        run: |
          mkdir -p toolchain

          CLANG_URL=$(curl -s \
            "https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              url = a.get('browser_download_url', '')
              if url.endswith('.tar.zst'):
                  print(url); break
          ")

          if [ -z "$CLANG_URL" ]; then
            CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/11012025/neutron-clang-11012025.tar.zst"
            echo "API недоступен, фолбэк: $CLANG_URL"
          else
            echo "Скачиваем: $CLANG_URL"
          fi

          wget -q --show-progress "$CLANG_URL" -O neutron-clang.tar.zst
          tar --use-compress-program=zstd -xf neutron-clang.tar.zst -C toolchain
          rm neutron-clang.tar.zst

          echo "CLANG_BIN=$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/toolchain/bin/clang" --version

      # ───────────────────────────────────────────────────────────
      # 5. Применяем KSU (вариант по выбору)
      # ───────────────────────────────────────────────────────────
      - name: Apply KernelSU variant
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant || 'ksu-next' }}"
          echo "=== KSU вариант: $VARIANT ==="
          cd kernel

          case "$VARIANT" in
            sukisu-ultra)
              curl -LSs \
                "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
                | bash -s main
              ;;
            resukisu)
              # ReSukiSU — форк с упором на старые ядра (4.x, 5.x non-GKI)
              # Использует KernelSU API, но с более широкой совместимостью
              curl -LSs \
                "https://raw.githubusercontent.com/re-sukisu/re-sukisu/main/kernel/setup.sh" \
                | bash -s main || \
              # Фолбэк — официальная документация советует этот способ
              curl -LSs \
                "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" \
                | bash -s "non-gki"
              ;;
            *)
              # ksu-next (по умолчанию)
              curl -LSs \
                "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
                | bash -s next
              ;;
          esac

          # Ищем версию KSU
          KSU_VER=""
          for MK in \
            KernelSU/kernel/Makefile \
            KernelSU/Makefile \
            KernelSU-Next/kernel/Makefile; do
            if [ -f "$MK" ]; then
              KSU_VER=$(grep -E "^KERNELSU_VERSION\s*=|^KSU_VERSION\s*=" "$MK" \
                | head -1 | cut -d= -f2 | tr -d ' ')
              [ -n "$KSU_VER" ] && break
            fi
          done

          # Крайний случай — из git tag
          if [ -z "$KSU_VER" ] && [ -d "KernelSU" ]; then
            KSU_VER=$(cd KernelSU && git describe --tags --abbrev=0 2>/dev/null || true)
          fi
          [ -z "$KSU_VER" ] && KSU_VER="latest"

          echo "KSU версия: $KSU_VER"
          echo "KSU_VERSION=$KSU_VER" >> $GITHUB_ENV
          echo "KSU_VARIANT=$VARIANT" >> $GITHUB_ENV

      # ───────────────────────────────────────────────────────────
      # 6. SUSFS патчи (опционально)
      #
      #    Используем --dry-run ПЕРЕД применением.
      #    Если dry-run провалился — патч НЕ применяется (не ломаем код).
      # ───────────────────────────────────────────────────────────
      - name: Apply SUSFS patches
        run: |
          ENABLE="${{ github.event.inputs.enable_susfs || 'true' }}"
          VARIANT="${{ env.KSU_VARIANT }}"

          if [ "$ENABLE" != "true" ]; then
            echo "SUSFS отключён пользователем."
            echo "SUSFS_APPLIED=false" >> $GITHUB_ENV
            exit 0
          fi

          # Репозиторий патчей зависит от варианта KSU
          if [ "$VARIANT" = "sukisu-ultra" ]; then
            git clone --depth=1 \
              https://github.com/SukiSU-Ultra/SukiSU_patch \
              ksu_patches || \
            git clone --depth=1 \
              https://github.com/KernelSU-Next/kernel_patches \
              ksu_patches
          else
            git clone --depth=1 \
              https://github.com/KernelSU-Next/kernel_patches \
              ksu_patches
          fi

          echo "=== Найденные патчи: ==="
          find ksu_patches -name "*.patch" | sort

          cd kernel
          SUSFS_APPLIED=false

          # Кандидаты на основной патч (от более специфичного к общему)
          CANDIDATES=(
            "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel-4.19.patch"
            "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel-4.19.patch"
            "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel.patch"
            "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel.patch"
          )

          for CANDIDATE in "${CANDIDATES[@]}"; do
            [ ! -f "$CANDIDATE" ] && continue
            echo "Dry-run: $CANDIDATE"
            if patch -p1 --dry-run --no-backup-if-mismatch < "$CANDIDATE" > /dev/null 2>&1; then
              patch -p1 --no-backup-if-mismatch < "$CANDIDATE"
              SUSFS_APPLIED=true
              echo "SUSFS патч применён!"
              break
            else
              echo "Не совместим (dry-run failed) — пропускаем."
            fi
          done

          # fs/ mount hooks патч
          FS_CANDIDATES=(
            "$GITHUB_WORKSPACE/ksu_patches/next/fs_susfs.patch"
            "$GITHUB_WORKSPACE/ksu_patches/next/fs/susfs.patch"
            "$GITHUB_WORKSPACE/ksu_patches/fs_susfs.patch"
          )
          for CANDIDATE in "${FS_CANDIDATES[@]}"; do
            [ ! -f "$CANDIDATE" ] && continue
            echo "fs dry-run: $CANDIDATE"
            if patch -p1 --dry-run --no-backup-if-mismatch < "$CANDIDATE" > /dev/null 2>&1; then
              patch -p1 --no-backup-if-mismatch < "$CANDIDATE"
              echo "fs патч применён!"
              break
            fi
          done

          echo "SUSFS_APPLIED=$SUSFS_APPLIED" >> $GITHUB_ENV
          [ "$SUSFS_APPLIED" = "false" ] && \
            echo "SUSFS патчи не совместимы с этим ядром — сборка продолжится без SUSFS."

      # ───────────────────────────────────────────────────────────
      # 7. Конфигурируем ядро
      #
      #    SDM439 = MSM8937 семейство.
      #    В uvite-форке:
      #      vendor/msm8937-perf_defconfig  — базовый полный defconfig
      #      vendor/xiaomi-sdm439.config    — фрагмент поверх (SDM439 tweaks)
      #    Правильный порядок: сначала msm8937-perf_defconfig,
      #    потом merge_config.sh с xiaomi-sdm439.config.
      # ───────────────────────────────────────────────────────────
      - name: Configure kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          MAKE_FLAGS="O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1"

          # ── Шаг 1: базовый defconfig ──────────────────────────
          # SDM439 = MSM8937 в Qualcomm нотации
          BASE_DEFCONFIG=""
          for C in \
            vendor/msm8937-perf_defconfig \
            vendor/msm8937_defconfig \
            vendor/sdm439-perf_defconfig \
            vendor/sdm439_defconfig \
            vendor/olive_defconfig \
            olive_defconfig \
            msm8937-perf_defconfig; do
            if [ -f "arch/arm64/configs/$C" ]; then
              BASE_DEFCONFIG="$C"
              echo "Базовый defconfig: $BASE_DEFCONFIG"
              break
            fi
          done

          if [ -z "$BASE_DEFCONFIG" ]; then
            echo "ERROR: базовый defconfig не найден!"
            find arch/arm64/configs -maxdepth 3 | sort
            exit 1
          fi

          make $MAKE_FLAGS $BASE_DEFCONFIG

          # ── Шаг 2: мерджим фрагмент xiaomi-sdm439.config ──────
          FRAGMENT="arch/arm64/configs/vendor/xiaomi-sdm439.config"
          if [ -f "$FRAGMENT" ]; then
            echo "Мерджим фрагмент: $FRAGMENT"
            ./scripts/kconfig/merge_config.sh \
              -m out/.config \
              "$FRAGMENT"
            # merge_config.sh пишет .config в CWD — перемещаем в out/
            [ -f .config ] && mv .config out/.config
            make $MAKE_FLAGS olddefconfig
            echo "Фрагмент xiaomi-sdm439.config применён."
          else
            echo "Фрагмент xiaomi-sdm439.config не найден — используем только базовый конфиг."
          fi

          # ── Шаг 3: KSU опции ──────────────────────────────────
          scripts/config --file out/.config \
            -e KSU \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS

          # ── Шаг 4: SUSFS опции (если патч применился) ─────────
          if [ "${{ env.SUSFS_APPLIED }}" = "true" ]; then
            echo "Включаем SUSFS опции в .config"
            scripts/config --file out/.config \
              -e KSU_SUSFS \
              -e KSU_SUSFS_SUS_PATH \
              -e KSU_SUSFS_SUS_MOUNT \
              -e KSU_SUSFS_SUS_KSTAT \
              -e KSU_SUSFS_SUS_OVERLAYFS \
              -e KSU_SUSFS_TRY_UMOUNT \
              -e KSU_SUSFS_SPOOFE_UNAME \
              -e KSU_SUSFS_ENABLE_LOG
          else
            echo "SUSFS не применён — отключаем в .config"
            scripts/config --file out/.config -d KSU_SUSFS 2>/dev/null || true
          fi

          make $MAKE_FLAGS olddefconfig

          echo "=== CONFIG CHECK ==="
          grep -E "^CONFIG_KSU|^CONFIG_KPROBES|^CONFIG_SUSFS" out/.config || true
          echo "Configuration done."

      # ───────────────────────────────────────────────────────────
      # 8. Сборка ядра
      # ───────────────────────────────────────────────────────────
      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          BUILD_START=$(date +"%s")

          sed -i 's/EXPORT_TRACEPOINT_SYMBOL_GPL(clock_set_rate);/\/\/EXPORT_TRACEPOINT_SYMBOL_GPL(clock_set_rate);/g' kernel/trace/power-traces.c
          
          # Комментируем проблемную строку в KernelSU для старых ядер
          if [ -f drivers/kernelsu/allowlist.c ]; then
            sed -i 's/task_work_add(current, \&work->work, .*);/\/\/task_work_add(current, \&work->work, TWA_RESUME);/g' drivers/kernelsu/allowlist.c
          fi

          # set +e чтобы поймать код возврата и показать ошибки
          set +e
          make -j$(nproc --all) \
            O=out ARCH=arm64 \
            KCFLAGS="-Wno-error -Wno-pointer-arith -Wno-implicit-function-declaration -Wno-int-conversion -Wno-incompatible-pointer-types -Wno-shift-count-overflow -Wno-enum-conversion -Wno-return-type -Wno-constant-logical-operand -Wno-address-of-packed-member" \
            KCPPFLAGS="-Wno-error" \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            Image.gz-dtb 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          BUILD_END=$(date +"%s")
          DIFF=$((BUILD_END - BUILD_START))
          echo "Время сборки: $((DIFF / 60))m $((DIFF % 60))s"

          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "════════════════════════════════════"
            echo "     ОШИБКИ КОМПИЛЯЦИИ (error:)    "
            echo "════════════════════════════════════"
            grep -n " error:" build.log | grep -v "^Binary" | head -50 || true
            echo ""
            echo "══ ПОСЛЕДНИЕ 60 СТРОК ЛОГА ══"
            tail -60 build.log
            exit 1
          fi

          ls -lh out/arch/arm64/boot/Image.gz-dtb
          echo "Image.gz-dtb: OK"

      # ───────────────────────────────────────────────────────────
      # 9. Пакуем AnyKernel3
      # ───────────────────────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp anykernel3/anykernel.sh AK3/anykernel.sh
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AK3/

          DATE=$(date +%Y%m%d)
          SUSFS_TAG=""
          [ "${{ env.SUSFS_APPLIED }}" = "true" ] && SUSFS_TAG="-SUSFS"

          case "${{ env.KSU_VARIANT }}" in
            sukisu-ultra) PREFIX="SukiSU_Ultra" ;;
            resukisu)     PREFIX="ReSukiSU" ;;
            *)            PREFIX="KSU_Next" ;;
          esac

          ZIP_NAME="Kernel-Mi439-${PREFIX}_${{ env.KSU_VERSION }}${SUSFS_TAG}-${DATE}.zip"

          cd AK3
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . -x '*.git*'
          cd ..

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME"

      # ───────────────────────────────────────────────────────────
      # 10. Upload артефакт
      # ───────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-mi439-olive
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ───────────────────────────────────────────────────────────
      # 11. GitHub Release
      # ───────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Mi439/Olive — ${{ env.KSU_VARIANT }} ${{ env.KSU_VERSION }}${{ env.SUSFS_APPLIED == 'true' && '+SUSFS' || '' }} #${{ github.run_number }}"
          body: |
            ## Ядро для Redmi 8 / 8A / 8A Dual (olive / mi439)

            | Параметр | Значение |
            |---|---|
            | Источник ядра | `tavukkdoner/android_kernel_xiaomi_sdm439-4.19` ветка `uvite` |
            | KSU вариант | `${{ env.KSU_VARIANT }}` |
            | KSU версия | `${{ env.KSU_VERSION }}` |
            | SUSFS | ${{ env.SUSFS_APPLIED == 'true' && '✅ включён' || '❌ выключен / несовместим' }} |
            | Совместимые ROM | EvolutionX 16.0 (Android 16), другие 4.19-based |

            ### Установка
            1. Прошей ZIP через TWRP
            2. Установи APK KSU менеджера:
               - KSU Next: https://github.com/KernelSU-Next/KernelSU-Next/releases
               - SukiSU Ultra: https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases
               - ReSukiSU: https://github.com/rsuntk/KernelSU/releases

            ### Примечания
            > Собрано автоматически через GitHub Actions. Не тестировалось!
          files: ${{ env.ZIP_NAME }}
