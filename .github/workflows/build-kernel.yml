name: Build Kernel — Mi439/Olive (KSU Next + SUSFS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ksu_next_branch:
        description: 'KernelSU Next branch'
        required: false
        default: 'next'
      upload_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout этого репозитория (AnyKernel3 конфиг)
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Зависимости
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            python3 zip unzip curl wget \
            lz4 zstd

      # ─────────────────────────────────────────────
      # 3. Клонируем исходники ядра Mi-Thorium
      # ─────────────────────────────────────────────
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b mithorium/a13/master \
            https://github.com/Mi-Thorium/kernel_msm-4.19 \
            kernel
          echo "Kernel cloned."

      # ─────────────────────────────────────────────
      # 4. Клонируем Device Tree (DTS отдельный репо)
      # ─────────────────────────────────────────────
      - name: Clone device tree
        run: |
          git clone --depth=1 \
            https://github.com/Mi-Thorium/kernel_devicetree_msm-4.19 \
            kernel_dt
          # Копируем DTS файлы в исходники ядра
          # (Mi-Thorium держит их в отдельном репо)
          if [ -d kernel_dt/arch ]; then
            cp -r kernel_dt/arch kernel/
            echo "DTS merged from separate repo."
          fi

      # ─────────────────────────────────────────────
      # 5. Toolchain — Neutron Clang 18
      # ─────────────────────────────────────────────
      - name: Download Neutron Clang
        run: |
          mkdir -p toolchain
          # Берём последний Neutron Clang 18
          CLANG_URL=$(curl -s https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest \
            | grep "browser_download_url" \
            | grep "neutron-clang" \
            | head -1 \
            | cut -d '"' -f 4)

          if [ -z "$CLANG_URL" ]; then
            echo "Neutron Clang API failed, using fallback URL"
            # Фолбэк: ставим Clang 18 из apt
            sudo apt-get install -y clang-18 lld-18 llvm-18
            ln -sf /usr/bin/clang-18 /usr/bin/clang
            ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld
            echo "CLANG_BIN=/usr/bin" >> $GITHUB_ENV
            echo "CLANG_INSTALLED=apt" >> $GITHUB_ENV
          else
            echo "Downloading Neutron Clang from $CLANG_URL"
            wget -q "$CLANG_URL" -O neutron-clang.tar.zst
            tar --use-compress-program=zstd -xf neutron-clang.tar.zst -C toolchain
            rm neutron-clang.tar.zst
            echo "CLANG_BIN=$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_ENV
            echo "CLANG_INSTALLED=neutron" >> $GITHUB_ENV
          fi
          echo "Clang ready."

      # ─────────────────────────────────────────────
      # 6. Применяем KernelSU Next
      # ─────────────────────────────────────────────
      - name: Apply KernelSU Next
        run: |
          KSU_BRANCH="${{ github.event.inputs.ksu_next_branch || 'next' }}"
          echo "Using KSU Next branch: $KSU_BRANCH"
          cd kernel
          # Официальный способ установки KSU Next
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/${KSU_BRANCH}/kernel/setup.sh" \
            | bash -s "${KSU_BRANCH}"
          echo "KSU Next applied."
          # Проверяем что KSU заинтегрирован
          if [ -d "KernelSU" ]; then
            echo "KSU directory exists: OK"
            echo "KSU version: $(cat KernelSU/kernel/Makefile | grep ^KERNELSU_VERSION | cut -d= -f2 | tr -d ' ')"
          fi

      # ─────────────────────────────────────────────
      # 7. Применяем SUSFS патчи
      # ─────────────────────────────────────────────
      - name: Apply SUSFS patches
        run: |
          # Клонируем патчи SUSFS для KSU Next
          git clone --depth=1 \
            https://github.com/KernelSU-Next/kernel_patches \
            ksu_patches

          cd kernel

          # Патч для ядра 4.19 (non-GKI)
          # SUSFS основной патч
          PATCH_419="$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel-4.19.patch"
          if [ -f "$PATCH_419" ]; then
            echo "Applying SUSFS 4.19 patch..."
            patch -p1 --no-backup-if-mismatch < "$PATCH_419" && echo "OK"
          else
            echo "Patch 4.19 not found in ksu_patches/next/, trying other paths..."
            find "$GITHUB_WORKSPACE/ksu_patches" -name "*4.19*" -o -name "*susfs*" 2>/dev/null | head -20
            # Попробуем общий патч
            GENERIC_PATCH=$(find "$GITHUB_WORKSPACE/ksu_patches" -name "50_add_susfs_in_kernel*.patch" | head -1)
            if [ -n "$GENERIC_PATCH" ]; then
              echo "Trying: $GENERIC_PATCH"
              patch -p1 --no-backup-if-mismatch < "$GENERIC_PATCH" || true
            fi
          fi

          # Патч для fs/
          FS_PATCH="$GITHUB_WORKSPACE/ksu_patches/next/fs/susfs.patch"
          if [ -f "$FS_PATCH" ]; then
            echo "Applying fs susfs patch..."
            patch -p1 --no-backup-if-mismatch < "$FS_PATCH" || true
          fi

          echo "SUSFS patches done."

      # ─────────────────────────────────────────────
      # 8. Конфигурируем ядро
      # ─────────────────────────────────────────────
      - name: Configure kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          MAKE_FLAGS="O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1"

          # Базовый defconfig для SDM439 (olive = sdm439)
          make $MAKE_FLAGS vendor/sdm439-perf_defconfig

          # Применяем конфигурационные фрагменты Mi-Thorium
          MERGE_SCRIPT="scripts/kconfig/merge_config.sh"
          FRAGMENTS=""
          for frag in \
            arch/arm64/configs/vendor/common.config \
            arch/arm64/configs/vendor/feature/android-12.config \
            arch/arm64/configs/vendor/feature/exfat.config \
            arch/arm64/configs/vendor/feature/kprobes.config \
            arch/arm64/configs/vendor/feature/lmkd.config; do
            [ -f "$frag" ] && FRAGMENTS="$FRAGMENTS $frag"
          done

          if [ -n "$FRAGMENTS" ]; then
            echo "Merging fragments:$FRAGMENTS"
            KCONFIG_CONFIG=out/.config $MERGE_SCRIPT -m out/.config $FRAGMENTS
          fi

          # Включаем KSU + SUSFS опции
          scripts/config --file out/.config \
            -e KSU \
            -e KSU_SUSFS \
            -e KSU_SUSFS_SUS_PATH \
            -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT \
            -e KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT \
            -e KSU_SUSFS_SPOOFE_UNAME \
            -e KSU_SUSFS_ENABLE_LOG \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS

          make $MAKE_FLAGS olddefconfig
          echo "Configuration done."

      # ─────────────────────────────────────────────
      # 9. Сборка ядра
      # ─────────────────────────────────────────────
      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          BUILD_START=$(date +"%s")

          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            Image.gz-dtb \
            2>&1 | tee build.log

          BUILD_END=$(date +"%s")
          DIFF=$((BUILD_END - BUILD_START))
          echo "Build took $((DIFF / 60)) min $((DIFF % 60)) sec"

          # Проверяем артефакт
          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "ERROR: Image.gz-dtb not found! Build failed."
            tail -50 build.log
            exit 1
          fi
          echo "Image.gz-dtb built successfully."

      # ─────────────────────────────────────────────
      # 10. Пакуем AnyKernel3
      # ─────────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          # Клонируем базовый AnyKernel3
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3 \
            AK3

          # Заменяем anykernel.sh нашим конфигом под olive
          cp anykernel3/anykernel.sh AK3/anykernel.sh

          # Копируем ядро
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AK3/

          # Имя зипа с датой и версией KSU
          DATE=$(date +%Y%m%d)
          KSU_VER=$(cat kernel/KernelSU/kernel/Makefile 2>/dev/null \
            | grep ^KERNELSU_VERSION | cut -d= -f2 | tr -d ' ' || echo "unknown")
          ZIP_NAME="Kernel-Mi439-Olive-KSU_Next_${KSU_VER}-SUSFS-${DATE}.zip"

          cd AK3
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . -x '*.git*' -x '*.github*'
          cd ..

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "Packaged: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      # ─────────────────────────────────────────────
      # 11. Загружаем как артефакт
      # ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-mi439-olive-ksu-susfs
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ─────────────────────────────────────────────
      # 12. Создаём GitHub Release (опционально)
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Kernel Mi439/Olive — KSU Next + SUSFS (build #${{ github.run_number }})"
          body: |
            ## Ядро для Redmi 8 (olive / mi439)

            - **Источник**: Mi-Thorium/kernel_msm-4.19 `mithorium/a13/master`
            - **KernelSU Next**: branch `${{ github.event.inputs.ksu_next_branch || 'next' }}`
            - **SUSFS**: включён
            - **ROM**: EvolutionX 16.0 (Android 16) / совместимые 4.19 прошивки
            - **Дата**: ${{ github.run_number }}

            ### Установка
            1. Скачай ZIP
            2. Прошей через TWRP / ADB sideload
            3. Установи APK KernelSU Next Manager
            4. Готово

            > ⚠️ Сделано **без тестирования**, прошивай на свой риск.
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
