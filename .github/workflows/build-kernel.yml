name: Build Kernel — Mi439/Olive (KSU Next / SukiSU Ultra + SUSFS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KSU вариант'
        required: true
        default: 'ksu-next'
        type: choice
        options:
          - ksu-next
          - sukisu-ultra
      enable_susfs:
        description: 'Включить SUSFS (скрытие root)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_release:
        description: 'Создать GitHub Release?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # ───────────────────────────────────────────────────────────
      # 1. Checkout
      # ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────
      # 2. Зависимости
      # ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            python3 zip unzip curl wget \
            lz4 zstd cpio kmod

      # ───────────────────────────────────────────────────────────
      # 3. Клонируем ядро
      #    tavukkdoner/android_kernel_xiaomi_sdm439-4.19 (uvite)
      #    — монолитный форк, все драйверы внутри одного репо.
      #    Mi-Thorium/kernel_msm-4.19 не подходит — там
      #    prima, techpack, camera и т.д. в отдельных репозиториях.
      # ───────────────────────────────────────────────────────────
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b uvite \
            https://github.com/tavukkdoner/android_kernel_xiaomi_sdm439-4.19 \
            kernel
          echo "=== Kernel cloned (uvite branch) ==="
          echo "techpack:"; ls kernel/techpack/ 2>/dev/null || echo "(empty)"
          echo "drivers/staging prima:"; ls kernel/drivers/staging/ | grep -i prima || echo "(no prima)"

      # ───────────────────────────────────────────────────────────
      # 4. Toolchain — Neutron Clang
      #    ubuntu-24.04: GLIBC 2.39 — совместим
      # ───────────────────────────────────────────────────────────
      - name: Download Neutron Clang
        run: |
          mkdir -p toolchain

          CLANG_URL=$(curl -s \
            "https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              url = a.get('browser_download_url', '')
              if url.endswith('.tar.zst'):
                  print(url); break
          ")

          if [ -z "$CLANG_URL" ]; then
            # Проверенная версия на ubuntu-24.04
            CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/11012025/neutron-clang-11012025.tar.zst"
            echo "API fallback: $CLANG_URL"
          else
            echo "Latest: $CLANG_URL"
          fi

          wget -q --show-progress "$CLANG_URL" -O neutron-clang.tar.zst
          tar --use-compress-program=zstd -xf neutron-clang.tar.zst -C toolchain
          rm neutron-clang.tar.zst

          echo "CLANG_BIN=$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/toolchain/bin/clang" --version

      # ───────────────────────────────────────────────────────────
      # 5. Применяем KSU
      # ───────────────────────────────────────────────────────────
      - name: Apply KernelSU variant
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant || 'ksu-next' }}"
          echo "KSU variant: $VARIANT"
          cd kernel

          if [ "$VARIANT" = "sukisu-ultra" ]; then
            echo "--- SukiSU Ultra ---"
            curl -LSs \
              "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
              | bash -s main
            KSU_DIR="KernelSU"
            KSU_MK="KernelSU/kernel/Makefile"
          else
            echo "--- KernelSU Next ---"
            curl -LSs \
              "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
              | bash -s next
            KSU_DIR="KernelSU"
            KSU_MK="KernelSU/kernel/Makefile"
          fi

          if [ -f "$KSU_MK" ]; then
            KSU_VER=$(grep "^KERNELSU_VERSION\|^KSU_VERSION" "$KSU_MK" | head -1 | cut -d= -f2 | tr -d ' ')
            echo "KSU version: $KSU_VER"
            echo "KSU_VERSION=$KSU_VER" >> $GITHUB_ENV
          else
            echo "KSU_VERSION=unknown" >> $GITHUB_ENV
          fi

          echo "KSU_VARIANT=$VARIANT" >> $GITHUB_ENV

      # ───────────────────────────────────────────────────────────
      # 6. Применяем SUSFS патчи (если включено)
      #
      #    ВАЖНО: используем --dry-run перед применением.
      #    Если dry-run провалился → патч НЕ применяем, флаг off.
      #    Это предотвращает "broken code" от частичного патча.
      # ───────────────────────────────────────────────────────────
      - name: Apply SUSFS patches
        run: |
          ENABLE_SUSFS="${{ github.event.inputs.enable_susfs || 'true' }}"
          VARIANT="${{ env.KSU_VARIANT }}"
          echo "SUSFS enabled: $ENABLE_SUSFS"

          if [ "$ENABLE_SUSFS" != "true" ]; then
            echo "SUSFS отключён пользователем."
            echo "SUSFS_APPLIED=false" >> $GITHUB_ENV
            exit 0
          fi

          # Выбираем репо патчей в зависимости от варианта KSU
          if [ "$VARIANT" = "sukisu-ultra" ]; then
            git clone --depth=1 \
              https://github.com/SukiSU-Ultra/SukiSU_patch \
              ksu_patches
          else
            git clone --depth=1 \
              https://github.com/KernelSU-Next/kernel_patches \
              ksu_patches
          fi

          echo "=== Патчи: ==="
          find ksu_patches -name "*.patch" | sort

          cd kernel
          SUSFS_APPLIED=false

          # Список кандидатов по приоритету
          PATCH_CANDIDATES=()
          if [ "$VARIANT" = "sukisu-ultra" ]; then
            PATCH_CANDIDATES=(
              "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel-4.19.patch"
              "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel.patch"
              "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel-4.19.patch"
            )
          else
            PATCH_CANDIDATES=(
              "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel-4.19.patch"
              "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel-4.19.patch"
              "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel.patch"
              "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel.patch"
            )
          fi

          for CANDIDATE in "${PATCH_CANDIDATES[@]}"; do
            if [ -f "$CANDIDATE" ]; then
              echo "Проверяем (dry-run): $CANDIDATE"
              if patch -p1 --dry-run --no-backup-if-mismatch < "$CANDIDATE" 2>&1; then
                echo "Dry-run OK, применяем..."
                patch -p1 --no-backup-if-mismatch < "$CANDIDATE"
                SUSFS_APPLIED=true
                echo "SUSFS ядерный патч применён!"
                break
              else
                echo "Dry-run FAILED для $CANDIDATE — пропускаем"
              fi
            fi
          done

          # fs/ mount hooks патч
          FS_CANDIDATES=()
          if [ "$VARIANT" = "sukisu-ultra" ]; then
            FS_CANDIDATES=(
              "$GITHUB_WORKSPACE/ksu_patches/fs_susfs.patch"
              "$GITHUB_WORKSPACE/ksu_patches/next/fs_susfs.patch"
            )
          else
            FS_CANDIDATES=(
              "$GITHUB_WORKSPACE/ksu_patches/next/fs_susfs.patch"
              "$GITHUB_WORKSPACE/ksu_patches/next/fs/susfs.patch"
              "$GITHUB_WORKSPACE/ksu_patches/fs_susfs.patch"
            )
          fi

          for CANDIDATE in "${FS_CANDIDATES[@]}"; do
            if [ -f "$CANDIDATE" ]; then
              echo "fs патч dry-run: $CANDIDATE"
              if patch -p1 --dry-run --no-backup-if-mismatch < "$CANDIDATE" 2>&1; then
                patch -p1 --no-backup-if-mismatch < "$CANDIDATE"
                echo "fs патч применён!"
                break
              else
                echo "fs патч FAILED dry-run — пропускаем"
              fi
            fi
          done

          echo "SUSFS_APPLIED=$SUSFS_APPLIED" >> $GITHUB_ENV

          if [ "$SUSFS_APPLIED" = "false" ]; then
            echo "⚠️  SUSFS патчи не совместимы с этим ядром."
            echo "⚠️  Продолжаем без SUSFS."
          fi

      # ───────────────────────────────────────────────────────────
      # 7. Конфигурируем
      # ───────────────────────────────────────────────────────────
      - name: Configure kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          MAKE_FLAGS="O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1"

          # Ищем defconfig для SDM439/olive
          DEFCONFIG=""
          for C in \
            vendor/sdm439-perf_defconfig \
            vendor/olive_defconfig \
            olive_defconfig \
            sdm439-perf_defconfig \
            vendor/sdm439_defconfig; do
            if [ -f "arch/arm64/configs/$C" ]; then
              DEFCONFIG="$C"; echo "defconfig: $DEFCONFIG"; break
            fi
          done

          if [ -z "$DEFCONFIG" ]; then
            echo "=== Доступные defconfig ==="
            find arch/arm64/configs -name "*sdm*" -o -name "*439*" -o -name "*olive*" | sort
            echo "ERROR: defconfig не найден!"
            exit 1
          fi

          make $MAKE_FLAGS $DEFCONFIG

          # KSU опции
          scripts/config --file out/.config \
            -e KSU \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS

          # SUSFS опции — только если патч реально применился
          if [ "${{ env.SUSFS_APPLIED }}" = "true" ]; then
            echo "Включаем KSU_SUSFS опции в .config"
            scripts/config --file out/.config \
              -e KSU_SUSFS \
              -e KSU_SUSFS_SUS_PATH \
              -e KSU_SUSFS_SUS_MOUNT \
              -e KSU_SUSFS_SUS_KSTAT \
              -e KSU_SUSFS_SUS_OVERLAYFS \
              -e KSU_SUSFS_TRY_UMOUNT \
              -e KSU_SUSFS_SPOOFE_UNAME \
              -e KSU_SUSFS_ENABLE_LOG
          else
            echo "SUSFS не применён — отключаем в .config"
            scripts/config --file out/.config \
              -d KSU_SUSFS 2>/dev/null || true
          fi

          make $MAKE_FLAGS olddefconfig
          echo "=== CONFIG CHECK ==="
          grep -E "^CONFIG_KSU|^CONFIG_KPROBES|^CONFIG_KSU_SUSFS" out/.config || true
          echo "Configuration done."

      # ───────────────────────────────────────────────────────────
      # 8. Сборка
      # ───────────────────────────────────────────────────────────
      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          BUILD_START=$(date +"%s")

          # Сборка с выводом реальных ошибок:
          # - tee в build.log
          # - при ошибке grep ищет строки с "error:" для диагностики
          set +e
          make -j$(nproc --all) \
            O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            Image.gz-dtb 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          BUILD_END=$(date +"%s")
          DIFF=$((BUILD_END - BUILD_START))
          echo "Build time: $((DIFF / 60))m $((DIFF % 60))s"

          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════╗"
            echo "║            ОШИБКИ КОМПИЛЯЦИИ                    ║"
            echo "╚══════════════════════════════════════════════════╝"
            grep -n " error:" build.log | grep -v "^Binary" | head -40 || true
            echo ""
            echo "══ ПОСЛЕДНИЕ 50 СТРОК ЛОГА ══"
            tail -50 build.log
            exit 1
          fi

          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "ERROR: Image.gz-dtb не найден!"
            exit 1
          fi
          echo "Image.gz-dtb: OK"

      # ───────────────────────────────────────────────────────────
      # 9. Пакуем AnyKernel3
      # ───────────────────────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp anykernel3/anykernel.sh AK3/anykernel.sh
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AK3/

          DATE=$(date +%Y%m%d)
          VARIANT="${{ env.KSU_VARIANT }}"
          VER="${{ env.KSU_VERSION }}"
          SUSFS_TAG=""
          [ "${{ env.SUSFS_APPLIED }}" = "true" ] && SUSFS_TAG="-SUSFS"

          if [ "$VARIANT" = "sukisu-ultra" ]; then
            ZIP_NAME="Kernel-Mi439-SukiSU_Ultra_${VER}${SUSFS_TAG}-${DATE}.zip"
          else
            ZIP_NAME="Kernel-Mi439-KSU_Next_${VER}${SUSFS_TAG}-${DATE}.zip"
          fi

          cd AK3
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . -x '*.git*'
          cd ..

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME"

      # ───────────────────────────────────────────────────────────
      # 10. Upload артефакт
      # ───────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-mi439-olive
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ───────────────────────────────────────────────────────────
      # 11. GitHub Release
      # ───────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Kernel Mi439/Olive — ${{ env.KSU_VARIANT }} ${{ env.KSU_VERSION }} (build #${{ github.run_number }})"
          body: |
            ## Ядро для Redmi 8 (olive / mi439)

            | Параметр | Значение |
            |---|---|
            | Источник | tavukkdoner/android_kernel_xiaomi_sdm439-4.19 `uvite` |
            | KSU вариант | `${{ env.KSU_VARIANT }}` |
            | KSU версия | `${{ env.KSU_VERSION }}` |
            | SUSFS | ${{ env.SUSFS_APPLIED == 'true' && '✅ включён' || '❌ не применён (патч несовместим)' }} |
            | ROM | EvolutionX 16.0 / Android 16 |

            ### Установка
            1. Прошей ZIP через TWRP
            2. Установи APK менеджера:
               - KSU Next: https://github.com/KernelSU-Next/KernelSU-Next/releases
               - SukiSU Ultra: https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases
          files: ${{ env.ZIP_NAME }}
