name: Build Kernel (Redmi 8) - KSU Next + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    name: Build by Vladimir
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex libssl-dev libelf-dev clang lld llvm
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone Kernel Source
        run: |
          # Клонируем ядро Mi-Thorium
          git clone --depth=1 https://github.com/Mi-Thorium/kernel_msm-4.19 -b 14 kernel
          echo "KERNEL_DIR=$(pwd)/kernel" >> $GITHUB_ENV

      - name: Clone Toolchain (Clang)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

      - name: Integrate KernelSU Next
        run: |
          cd kernel
          # Убираем старый KSU и ставим свежий Next
          rm -rf drivers/kernelsu
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s main

      - name: Apply SUSFS Patches
        run: |
          # Клонируем официальный репозиторий патчей
          git clone https://gitlab.com/simonpunk/susfs4ksu.git susfs_src
          
          cd kernel
          # 1. Копируем файлы ядра SUSFS
          cp ../susfs_src/kernel_patches/include/linux/susfs.h include/linux/
          cp ../susfs_src/kernel_patches/fs/susfs.c fs/
          
          # 2. Подготавливаем патч именно для 4.19
          # Пробуем найти патч 4.19 в разных подпапках (структура иногда меняется)
          SUS_PATCH=$(find ../susfs_src/kernel_patches/ -name "*4.19*.patch" | head -n 1)
          echo "Using patch: $SUS_PATCH"
          
          # 3. Применяем патч с игнорированием мелких ошибок (fuzz)
          patch -p1 --fuzz=3 < "$SUS_PATCH" || {
            echo "Warning: Patch applied with some errors. Checking status..."
          }

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$(pwd)/../clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Настройка аргументов сборки
          MAKE_ARGS="
            CC=clang
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
          "
          
          # Конфигурация
          make O=out $MAKE_ARGS olive_defconfig
          
          # Включаем KSU и SUSFS в конфиге
          scripts/config --file out/.config --enable CONFIG_KSU
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
          scripts/config --file out/.config --enable CONFIG_SUSFS
          
          # Сама сборка
          make -j$(nproc --all) O=out $MAKE_ARGS

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Redmi8-KSU-SUSFS
          path: kernel/out/arch/arm64/boot/Image.gz-dtb


