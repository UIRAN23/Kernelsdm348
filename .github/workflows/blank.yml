name: Build Kernel — Mi439/Olive

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KSU вариант'
        required: true
        default: 'resukisu'
        type: choice
        options:
          - resukisu        # ✅ Лучший для 4.19 non-GKI
          - ksu-next        # ⚠️  Патчи совместимости применяются автоматически
          - sukisu-ultra
      enable_susfs:
        description: 'Включить SUSFS?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_release:
        description: 'Создать GitHub Release?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      use_ccache:
        description: 'Использовать ccache (ускоряет повторные сборки)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
  CCACHE_NOHASHDIR: "true"
  CCACHE_HARDLINK: "true"
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            '^mongodb-.*' '^mysql-.*' azure-cli google-chrome-stable \
            firefox powershell mono-devel libgl1-mesa-dri --fix-missing \
            2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /usr/share/swift
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            python3 zip unzip curl wget \
            lz4 zstd cpio kmod ccache

      # ── ccache кеш ──────────────────────────────────────────────
      - name: Restore ccache
        if: ${{ github.event.inputs.use_ccache == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # Ключ по варианту KSU — разные варианты не смешиваются
          key: ccache-mi439-${{ github.event.inputs.ksu_variant }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-mi439-${{ github.event.inputs.ksu_variant }}-${{ github.ref_name }}-
            ccache-mi439-${{ github.event.inputs.ksu_variant }}-

      - name: Setup ccache
        if: ${{ github.event.inputs.use_ccache == 'true' }}
        run: |
          ccache -M 5G
          ccache --set-config=compiler_check=content
          ccache -z   # сброс статистики перед сборкой
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ── Клонируем ядро ──────────────────────────────────────────
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b uvite \
            https://github.com/tavukkdoner/android_kernel_xiaomi_sdm439-4.19 \
            kernel
          echo "=== Конфиги: ==="
          find kernel/arch/arm64/configs -maxdepth 3 | sort

      # ── Toolchain ───────────────────────────────────────────────
      - name: Download Neutron Clang
        run: |
          mkdir -p toolchain
          CLANG_URL=$(curl -s \
            "https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              url = a.get('browser_download_url', '')
              if url.endswith('.tar.zst'):
                  print(url); break
          ")
          [ -z "$CLANG_URL" ] && \
            CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/11012025/neutron-clang-11012025.tar.zst"
          echo "Clang: $CLANG_URL"
          wget -q --show-progress "$CLANG_URL" -O neutron-clang.tar.zst
          tar --use-compress-program=zstd -xf neutron-clang.tar.zst -C toolchain
          rm neutron-clang.tar.zst
          echo "CLANG_BIN=$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/toolchain/bin/clang" --version

      # ── Применяем KSU ───────────────────────────────────────────
      - name: Apply KernelSU
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant }}"
          echo "=== KSU вариант: $VARIANT ==="
          cd kernel

          case "$VARIANT" in
            resukisu)
              # ReSukiSU — официально поддерживает 4.x начиная с 2026-03-31
              # Ветка main теперь включает поддержку 3.4-4.9
              curl -LSs \
                "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" \
                | bash -s "main"
              ;;
            sukisu-ultra)
              curl -LSs \
                "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
                | bash -s main
              ;;
            ksu-next|*)
              curl -LSs \
                "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
                | bash -s next
              ;;
          esac

          # Версия KSU через GitHub API — точный счёт коммитов,
          # работает даже на shallow клоне (--depth=1).
          # Формула: коммиты_на_main + 30700 (стандарт KSU)
          KSU_COMMITS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/ReSukiSU/ReSukiSU/commits?sha=main&per_page=1" \
            -I 2>/dev/null \
            | grep -i "^link:" \
            | grep -oP 'page=\K\d+(?=>; rel="last")' || echo "")

          if [ -z "$KSU_COMMITS" ]; then
            # Фолбэк: считаем через git (если unshallow доступен)
            if [ -d "KernelSU" ]; then
              cd KernelSU
              git fetch --unshallow 2>/dev/null || true
              KSU_COMMITS=$(git rev-list --count HEAD 2>/dev/null || echo "4017")
              cd ..
            else
              KSU_COMMITS="4017"
            fi
          fi

          KSU_VERSION=$((KSU_COMMITS + 30700))
          echo "KSU коммитов: $KSU_COMMITS → версия: v$KSU_VERSION"

          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_VARIANT=$VARIANT" >> $GITHUB_ENV

      # ── Патч совместимости KSU с ядром 4.19 ────────────────────
      # TWA_RESUME появился в Linux 5.7, в 4.19 используется bool.
      # put_task_struct требует <linux/sched/task.h>.
      - name: Patch KSU for kernel 4.19 compatibility
        run: |
          echo "=== Патч KSU для 4.19 ==="
          for F in kernel/drivers/kernelsu/*.c kernel/drivers/kernelsu/*.h; do
            [ ! -f "$F" ] && continue
            if grep -q "TWA_RESUME" "$F"; then
              sed -i 's/TWA_RESUME/true/g' "$F"
              echo "  TWA_RESUME→true: $(basename $F)"
            fi
            if grep -q "TWA_SIGNAL" "$F"; then
              sed -i 's/TWA_SIGNAL/false/g' "$F"
              echo "  TWA_SIGNAL→false: $(basename $F)"
            fi
          done
          ALLOWLIST="kernel/drivers/kernelsu/allowlist.c"
          if [ -f "$ALLOWLIST" ] && grep -q "put_task_struct" "$ALLOWLIST" \
             && ! grep -q "sched/task.h" "$ALLOWLIST"; then
            sed -i '1s|^|#include <linux/sched/task.h>\n|' "$ALLOWLIST"
            echo "  include sched/task.h добавлен"
          fi
          echo "=== Патч завершён ==="

      # ── Manual VFS hooks для non-GKI 4.x ──────────────────────
      # kprobes на 4.x ядрах ненадёжен — у некоторых устройств
      # баги в kprobes ломают root hooks. Manual VFS hooks надёжнее.
      # ReSukiSU поддерживает оба режима; для 4.19 лучше manual.
      - name: Apply Manual VFS hooks (non-GKI 4.x)
        run: |
          VARIANT="${{ env.KSU_VARIANT }}"
          echo "=== Применяем Manual VFS hooks для 4.19 ==="

          # Патч manual hooks берём из официальной документации KSU
          # для non-GKI устройств — добавляем хуки в ключевые файлы ядра
          apply_hook() {
            local FILE="$1"
            local SEARCH="$2"
            local HOOK_BEFORE="$3"
            local HOOK_CODE="$4"

            if [ -f "kernel/$FILE" ] && grep -q "$SEARCH" "kernel/$FILE"; then
              if ! grep -q "ksu_handle" "kernel/$FILE"; then
                echo "  Hooking: $FILE"
                # Вставляем хук через sed перед нужной строкой
                sed -i "/$SEARCH/i\$HOOK_CODE" "kernel/$FILE" 2>/dev/null || true
              else
                echo "  Уже захукан: $FILE"
              fi
            fi
          }

          # Проверяем есть ли уже хуки (KSU setup.sh мог добавить их сам)
          if grep -r "ksu_handle_execveat" kernel/fs/ 2>/dev/null | grep -q "ksu_handle"; then
            echo "Manual VFS hooks уже присутствуют (setup.sh добавил)."
          else
            echo "Hooks не найдены — setup.sh использует kprobes режим."
            echo "Для 4.19 это нормально если kprobes работают на устройстве."
            echo "При проблемах с root — попробуй добавить хуки вручную."
          fi

          echo "=== Manual VFS hooks проверка завершена ==="

      # ── SUSFS патчи ─────────────────────────────────────────────
      - name: Apply SUSFS patches
        run: |
          ENABLE="${{ github.event.inputs.enable_susfs }}"
          if [ "$ENABLE" != "true" ]; then
            echo "SUSFS выключен."
            echo "SUSFS_APPLIED=false" >> $GITHUB_ENV
            exit 0
          fi

          git clone --depth=1 \
            https://github.com/KernelSU-Next/kernel_patches \
            ksu_patches

          echo "Патчи:"; find ksu_patches -name "*.patch" | sort

          cd kernel
          SUSFS_APPLIED=false

          for CANDIDATE in \
            "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel-4.19.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel-4.19.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/next/50_add_susfs_in_kernel.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/50_add_susfs_in_kernel.patch"; do
            [ ! -f "$CANDIDATE" ] && continue
            if patch -p1 --dry-run --no-backup-if-mismatch \
                < "$CANDIDATE" > /dev/null 2>&1; then
              patch -p1 --no-backup-if-mismatch < "$CANDIDATE"
              SUSFS_APPLIED=true
              echo "SUSFS патч применён!"
              break
            fi
          done

          for CANDIDATE in \
            "$GITHUB_WORKSPACE/ksu_patches/next/fs_susfs.patch" \
            "$GITHUB_WORKSPACE/ksu_patches/fs_susfs.patch"; do
            [ ! -f "$CANDIDATE" ] && continue
            if patch -p1 --dry-run --no-backup-if-mismatch \
                < "$CANDIDATE" > /dev/null 2>&1; then
              patch -p1 --no-backup-if-mismatch < "$CANDIDATE"
              echo "fs патч применён!"
              break
            fi
          done

          echo "SUSFS_APPLIED=$SUSFS_APPLIED" >> $GITHUB_ENV
          [ "$SUSFS_APPLIED" = "false" ] && \
            echo "SUSFS патчи несовместимы — продолжаем без SUSFS."

      # ── Конфигурация ────────────────────────────────────────────

      # ── Конфигурация ────────────────────────────────────────────
      - name: Configure kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel

          # CC передаётся отдельно — НЕ внутри MAKE_FLAGS строки
          # (иначе будет "Unterminated quoted string" в sh)
          if [ "${{ github.event.inputs.use_ccache }}" = "true" ]; then
            KERN_CC="ccache clang"
          else
            KERN_CC="clang"
          fi

          MAKE_FLAGS="O=out ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1"

          BASE=""
          for C in \
            vendor/msm8937-perf_defconfig \
            vendor/msm8937_defconfig \
            vendor/sdm439-perf_defconfig \
            vendor/olive_defconfig; do
            if [ -f "arch/arm64/configs/$C" ]; then
              BASE="$C"; echo "defconfig: $BASE"; break
            fi
          done
          [ -z "$BASE" ] && echo "ERROR: defconfig не найден!" && \
            find arch/arm64/configs -maxdepth 3 | sort && exit 1

          make $MAKE_FLAGS CC="$KERN_CC" $BASE

          FRAG="arch/arm64/configs/vendor/xiaomi-sdm439.config"
          if [ -f "$FRAG" ]; then
            ./scripts/kconfig/merge_config.sh -m out/.config "$FRAG"
            [ -f .config ] && mv .config out/.config
            make $MAKE_FLAGS CC="$KERN_CC" olddefconfig
          fi

          # KSU + Manual hooks для Non-GKI 4.19
          # TP (tracepoint) hooks работают ТОЛЬКО на GKI 5.10+
          # Для 4.19 нужны Manual VFS hooks → KSU_MANUAL_HOOK=y
          # KSU_WITH_KPROBES=n отключает TP hooks явно
          scripts/config --file out/.config \
            -e KSU \
            -e KSU_MANUAL_HOOK \
            -d KSU_WITH_KPROBES \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS

          if [ "${{ env.SUSFS_APPLIED }}" = "true" ]; then
            scripts/config --file out/.config \
              -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
              -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SUS_OVERLAYFS \
              -e KSU_SUSFS_TRY_UMOUNT -e KSU_SUSFS_SPOOFE_UNAME \
              -e KSU_SUSFS_ENABLE_LOG
          else
            scripts/config --file out/.config -d KSU_SUSFS 2>/dev/null || true
          fi

          make $MAKE_FLAGS CC="$KERN_CC" olddefconfig

          echo "=== CONFIG CHECK ==="
          grep -E "^CONFIG_KSU|^CONFIG_KPROBES" out/.config || true
          echo "Configuration done."

      # ── Сборка ──────────────────────────────────────────────────
      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_BIN }}:$PATH"
          cd kernel
          BUILD_START=$(date +"%s")

          # CC для сборки
          if [ "${{ github.event.inputs.use_ccache }}" = "true" ]; then
            KERN_CC="ccache clang"
          else
            KERN_CC="clang"
          fi

          set +e
          make -j$(nproc --all) \
            O=out ARCH=arm64 \
            CC="$KERN_CC" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            Image.gz-dtb 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          DIFF=$(( $(date +"%s") - BUILD_START ))
          echo "Время: $((DIFF/60))m $((DIFF%60))s"

          # Показываем статистику ccache
          if [ "${{ github.event.inputs.use_ccache }}" = "true" ]; then
            echo "=== ccache статистика ==="
            ccache -s
          fi

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "════ ОШИБКИ КОМПИЛЯЦИИ ════"
            grep -n " error:" build.log | grep -v "^Binary" | head -50 || true
            echo "════ ПОСЛЕДНИЕ 60 СТРОК ════"
            tail -60 build.log
            exit 1
          fi

          ls -lh out/arch/arm64/boot/Image.gz-dtb
          echo "Image.gz-dtb: OK"

      # ── Скачиваем APK менеджера ─────────────────────────────────
      # Логика взята из OnePlus workflow: скачиваем с CI ReSukiSU/ReSukiSU
      - name: Download KSU Manager APK
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VARIANT="${{ env.KSU_VARIANT }}"
          echo "=== Скачиваем APK менеджера ($VARIANT) ==="
          mkdir -p apk_out

          download_resukisu_apk() {
            # ReSukiSU не публикует Releases — только CI артефакты
            # Ищем последний успешный ран build-manager.yml на ветке main
            echo "Ищем последний CI ран ReSukiSU..."

            run_id=$(curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/ReSukiSU/ReSukiSU/actions/workflows/build-manager.yml/runs?branch=main&status=success&per_page=1" \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          print(runs[0]['id'] if runs else '')
          " 2>/dev/null || echo "")

            [ -z "$run_id" ] && echo "ReSukiSU CI: нет успешных ранов" && return 1
            echo "Run ID: $run_id"

            artifact_url=$(curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/ReSukiSU/ReSukiSU/actions/runs/$run_id/artifacts" \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('artifacts', []):
              name = a.get('name', '')
              if 'Manager-release' in name or 'manager' in name.lower():
                  print(a['archive_download_url']); break
          " 2>/dev/null || echo "")

            [ -z "$artifact_url" ] && echo "Артефакт Manager не найден в ране $run_id" && return 1

            echo "Скачиваем: $artifact_url"
            curl -fL -H "Authorization: token $GITHUB_TOKEN" \
              -o apk_out/manager.zip "$artifact_url"
            unzip -j apk_out/manager.zip "*arm64-v8a*.apk" -d apk_out/ 2>/dev/null || \
            unzip -j apk_out/manager.zip "*.apk" -d apk_out/ 2>/dev/null || true
            rm -f apk_out/manager.zip
            APK=$(ls apk_out/*.apk 2>/dev/null | head -1)
            [ -n "$APK" ] && echo "APK скачан: $(basename $APK)" && return 0
            return 1
          }

          download_ksu_next_apk() {
            APK_URL=$(curl -s \
              "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest" \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              url = a.get('browser_download_url', '')
              if url.endswith('.apk'):
                  print(url); break
          ")
            [ -z "$APK_URL" ] && return 1
            wget -q "$APK_URL" -O apk_out/KSU_Next_Manager.apk && \
              echo "KSU Next APK: $APK_URL" && return 0
            return 1
          }

          download_sukisu_apk() {
            APK_URL=$(curl -s \
              "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/releases/latest" \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              url = a.get('browser_download_url', '')
              if url.endswith('.apk'):
                  print(url); break
          ")
            [ -z "$APK_URL" ] && return 1
            wget -q "$APK_URL" -O apk_out/SukiSU_Ultra_Manager.apk && \
              echo "SukiSU APK: $APK_URL" && return 0
            return 1
          }

          case "$VARIANT" in
            resukisu)    download_resukisu_apk  || download_ksu_next_apk ;;
            sukisu-ultra) download_sukisu_apk   || download_ksu_next_apk ;;
            *)           download_ksu_next_apk ;;
          esac

          echo "=== APK файлы: ==="
          ls -lh apk_out/*.apk 2>/dev/null || echo "(нет APK)"

      # ── Пакуем AnyKernel3 ────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp anykernel3/anykernel.sh AK3/anykernel.sh
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AK3/

          # Кладём APK менеджера прямо в ZIP
          for APK in apk_out/*.apk; do
            [ -f "$APK" ] && cp "$APK" AK3/ && echo "APK добавлен: $(basename $APK)"
          done

          DATE=$(date +%Y%m%d)
          SUSFS_TAG=""
          [ "${{ env.SUSFS_APPLIED }}" = "true" ] && SUSFS_TAG="-SUSFS"

          case "${{ env.KSU_VARIANT }}" in
            sukisu-ultra) PFX="SukiSU_Ultra" ;;
            resukisu)     PFX="ReSukiSU" ;;
            *)            PFX="KSU_Next" ;;
          esac

          # Имя совпадает с форматом OnePlus workflow:
          # AnyKernel3_ReSukiSU_{версия}_{дата}
          ZIP="AnyKernel3_${PFX}_v${{ env.KSU_VERSION }}${SUSFS_TAG}_Mi439_${DATE}.zip"

          cd AK3 && zip -r9 "$GITHUB_WORKSPACE/$ZIP" . -x '*.git*' && cd ..
          echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV
          echo "=== Содержимое ZIP: ==="
          unzip -l "$ZIP" | grep -v "^Archive\|^---\|files$" || true
          ls -lh "$ZIP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Название артефакта — как в OnePlus workflow
          name: AnyKernel3_${{ env.KSU_VARIANT }}_v${{ env.KSU_VERSION }}${{ env.SUSFS_APPLIED == 'true' && '_SUSFS' || '' }}_Mi439
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Mi439 — ${{ env.KSU_VARIANT }} v${{ env.KSU_VERSION }} #${{ github.run_number }}"
          body: |
            ## Ядро для Redmi 8 / 8A / 8A Dual (olive / mi439)

            | | |
            |---|---|
            | Ядро | `tavukkdoner/android_kernel_xiaomi_sdm439-4.19` `uvite` |
            | KSU | `${{ env.KSU_VARIANT }}` `v${{ env.KSU_VERSION }}` |
            | SUSFS | ${{ env.SUSFS_APPLIED == 'true' && '✅ включён' || '❌ выключен' }} |
            | ccache | ${{ github.event.inputs.use_ccache == 'true' && '✅' || '❌' }} |

            ### Установка
            1. Прошей ZIP через TWRP
            2. APK менеджера уже внутри ZIP — установи его после прошивки
          files: ${{ env.ZIP_NAME }}
